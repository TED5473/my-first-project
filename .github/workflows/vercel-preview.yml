name: Deploy Preview (Vercel)

on:
  pull_request:
    branches: [main]

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy preview
    runs-on: ubuntu-latest
    if: ${{ vars.VERCEL_PROJECT_ID != '' }}
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel env (preview)
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.url }}";
            const body = `### Preview deploy ready\n\n${url}\n\n_updated by GitHub Actions_`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c =>
              c.user?.type === "Bot" && c.body?.startsWith("### Preview deploy ready")
            );
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
